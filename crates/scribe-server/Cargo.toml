[package.metadata.cargo-machete]
ignored = [
  "rmp-serde",
  "serde",
  "thiserror",
  "uuid",
  "reqwest",
  "semver",
  "serde_json",
  "minisign-verify",
]

[dependencies]
scribe-common.workspace = true
alacritty_terminal.workspace = true
dirs.workspace = true
scribe-pty.workspace = true
tokio.workspace = true
serde.workspace = true
rmp-serde.workspace = true
uuid.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
vte.workspace = true
libc.workspace = true
nix.workspace = true
reqwest.workspace = true
futures-util = "0.3"
semver.workspace = true
serde_json.workspace = true
minisign-verify.workspace = true
sha2 = "0.10"

[dev-dependencies]
# test-util: provides #[tokio::test] macro for async tests.
tokio = { workspace = true, features = ["test-util"] }
# nix::pty::openpty() is available via the existing "term" feature — no extra
# dev-dependency needed for nix.
