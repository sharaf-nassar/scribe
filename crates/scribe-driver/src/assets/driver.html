<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scribe Driver</title>
	<link rel="stylesheet" href="driver.css">
</head>
<body>
<div class="driver-window">

	<!-- ───────── Sidebar ───────── -->
	<div class="sidebar">
		<div class="sidebar-header">
			<span class="sidebar-robot">🤖</span>
			<span class="sidebar-title">Driver</span>
		</div>

		<nav class="sidebar-nav">
			<div class="nav-item active" data-view="dashboard" id="nav-dashboard">
				<svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
					<rect x="2" y="2" width="5" height="5" rx="1"/>
					<rect x="9" y="2" width="5" height="5" rx="1"/>
					<rect x="2" y="9" width="5" height="5" rx="1"/>
					<rect x="9" y="9" width="5" height="5" rx="1"/>
				</svg>
				Dashboard
			</div>
		</nav>

		<div class="sidebar-section-label">Tasks</div>

		<!-- Active task list -->
		<div class="sidebar-task-list" id="sidebar-task-list">
			<!-- Populated by driver.js -->
			<!-- Empty state -->
			<div class="sidebar-empty" id="sidebar-empty-active">No active tasks</div>
		</div>

		<!-- Completed section -->
		<div class="sidebar-section-label sidebar-section-label--completed" id="sidebar-completed-label">Completed</div>
		<div class="sidebar-task-list sidebar-task-list--completed" id="sidebar-completed-list">
			<!-- Populated by driver.js -->
		</div>

		<!-- Stats grid -->
		<div class="sidebar-stats" id="sidebar-stats">
			<div class="stats-grid">
				<div class="stat-cell">
					<span class="stat-label">Run</span>
					<span class="stat-value stat-value--green" id="stat-running">0</span>
				</div>
				<div class="stat-cell">
					<span class="stat-label">Done</span>
					<span class="stat-value stat-value--blue" id="stat-done">0</span>
				</div>
				<div class="stat-cell">
					<span class="stat-label">Fail</span>
					<span class="stat-value stat-value--red" id="stat-fail">0</span>
				</div>
				<div class="stat-cell">
					<span class="stat-label">Tok</span>
					<span class="stat-value stat-value--purple" id="stat-tokens">0</span>
				</div>
			</div>
		</div>

		<div class="sidebar-footer">
			<button class="new-task-btn" id="btn-new-task" data-view="new-task">
				+ New Task
			</button>
		</div>
	</div>

	<!-- ───────── Content ───────── -->
	<div class="content">

		<!-- ── Dashboard View ── -->
		<div id="view-dashboard" class="content-page active"></div>

		<!-- ── Task Detail View ── -->
		<div id="view-task-detail" class="content-page"></div>

		<!-- ── New Task View ── -->
		<div id="view-new-task" class="content-page"></div>

	</div>
</div>
<script src="driver.js"></script>
</body>
</html>
