[graph]
all-features = true

[output]
feature-depth = 1

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "warn"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
]

[licenses.private]
ignore = true

[advisories]
version = 2
unmaintained = "all"
unsound = "all"

[bans]
multiple-versions = "warn"
# Workspace-internal path crates use .workspace = true which cargo-deny
# sees as version = "*". Allow wildcards only for our own workspace crates.
wildcards = "allow"
highlight = "all"

deny = [
  { crate = "openssl", reason = "Use rustls instead" },
  { crate = "openssl-sys", reason = "Use rustls instead" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
