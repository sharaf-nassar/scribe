[graph]
all-features = true

[output]
feature-depth = 1

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "warn"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  "BSL-1.0",
]

[licenses.private]
ignore = true

[advisories]
version = 2
unmaintained = "all"
unsound = "all"
ignore = [
  # GTK3 bindings unmaintained — transitive via wry (webview); no GTK4 wry yet
  "RUSTSEC-2024-0411", # gdkwayland-sys
  "RUSTSEC-2024-0412", # atk
  "RUSTSEC-2024-0413", # atk-sys
  "RUSTSEC-2024-0414", # gdk
  "RUSTSEC-2024-0415", # gdk-sys
  "RUSTSEC-2024-0416", # gdkx11
  "RUSTSEC-2024-0417", # gdkx11-sys
  "RUSTSEC-2024-0418", # gtk
  "RUSTSEC-2024-0419", # gtk-sys
  "RUSTSEC-2024-0420", # gtk3-macros
  # proc-macro-error unmaintained — transitive via gtk3-macros/glib-macros
  "RUSTSEC-2024-0370",
  # glib VariantStrIter unsoundness — transitive via GTK3 bindings
  "RUSTSEC-2024-0429",
  # time 0.3.x stack exhaustion DoS — transitive via various crates
  "RUSTSEC-2026-0009",
]

[bans]
multiple-versions = "warn"
# Workspace-internal path crates use .workspace = true which cargo-deny
# sees as version = "*". Allow wildcards only for our own workspace crates.
wildcards = "allow"
highlight = "all"

deny = [
  { crate = "openssl", reason = "Use rustls instead" },
  { crate = "openssl-sys", reason = "Use rustls instead" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
