[package]
name = "unix-ancillary"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Safe, ergonomic Unix socket ancillary data (SCM_RIGHTS fd passing) with OwnedFd/BorrowedFd"
license = "MIT"
repository = "https://github.com/MohibShaikh/unix-ancillary"
keywords = ["unix", "socket", "fd-passing", "ancillary", "scm-rights"]
categories = ["os::unix-apis", "network-programming"]

[dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
