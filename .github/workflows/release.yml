name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            os: macos
          - label: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            os: macos

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Inject version
        env:
          TAG: ${{ github.ref_name }}
        run: bash dist/ci/inject-version.sh "${TAG#v}"

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libvulkan-dev

      - name: Install cargo-deb
        if: matrix.os == 'linux'
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux .deb)
        if: matrix.os == 'linux'
        run: cargo deb -p scribe-server --no-build --target ${{ matrix.target }}

      - name: Copy binaries for DMG packaging
        if: matrix.os == 'macos'
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/scribe-client   target/release/
          cp target/${{ matrix.target }}/release/scribe-server   target/release/
          cp target/${{ matrix.target }}/release/scribe-settings target/release/

      - name: Build DMG
        if: matrix.os == 'macos'
        env:
          TAG: ${{ github.ref_name }}
        run: bash dist/macos/build-dmg.sh --skip-build --version "${TAG#v}"

      - name: Sign and notarize DMG
        if: matrix.os == 'macos'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash dist/ci/sign-notarize-macos.sh

      - name: Install minisign
        run: |
          if [[ "${{ matrix.os }}" == "linux" ]]; then
            sudo apt-get install -y --no-install-recommends minisign
          else
            brew install minisign
          fi

      - name: Locate and sign artifact
        id: artifact
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          TAG: ${{ github.ref_name }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_LABEL: ${{ matrix.label }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [[ "$MATRIX_OS" == "linux" ]]; then
            SRC=$(find "target/${MATRIX_TARGET}/debian" -name '*.deb' | head -1)
            DEST="scribe_${TAG}_${MATRIX_LABEL}.deb"
          else
            SRC="target/Scribe.dmg"
            DEST="Scribe_${TAG}_${MATRIX_LABEL}.dmg"
          fi
          cp "$SRC" "$DEST"
          minisign -Sm "$DEST" -s <(echo "$MINISIGN_SECRET_KEY")
          echo "artifact=$DEST" >> "$GITHUB_OUTPUT"
          echo "sigfile=${DEST}.minisig" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            ${{ steps.artifact.outputs.artifact }}
            ${{ steps.artifact.outputs.sigfile }}
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Extract release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(git tag -l --format='%(contents)' "$TAG")
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.notes.outputs.notes }}" \
            artifacts/*.deb artifacts/*.dmg artifacts/*.minisig
