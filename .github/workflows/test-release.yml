name: Test Release Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            os: macos
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Inject version
        run: bash dist/ci/inject-version.sh "0.0.0-test"

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libvulkan-dev

      - name: Install cargo-deb
        if: matrix.os == 'linux'
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux .deb)
        if: matrix.os == 'linux'
        run: cargo deb -p scribe-server --no-build --target ${{ matrix.target }}

      - name: Copy binaries for DMG packaging
        if: matrix.os == 'macos'
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/scribe-client   target/release/
          cp target/${{ matrix.target }}/release/scribe-server   target/release/
          cp target/${{ matrix.target }}/release/scribe-settings target/release/

      - name: Build DMG
        if: matrix.os == 'macos'
        run: bash dist/macos/build-dmg.sh --skip-build --version "0.0.0-test"

      - name: Sign and notarize DMG
        if: matrix.os == 'macos'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash dist/ci/sign-notarize-macos.sh

      - name: Install minisign
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if [[ "$MATRIX_OS" == "linux" ]]; then
            MSIGN_VER="0.12"
            ARCH="$(uname -m)"
            curl -fsSL "https://github.com/jedisct1/minisign/releases/download/${MSIGN_VER}/minisign-${MSIGN_VER}-linux.tar.gz" \
              | sudo tar xz -C /usr/local/bin --strip-components=2 "minisign-linux/${ARCH}/minisign"
          else
            brew install minisign
          fi

      - name: Locate and sign artifact
        id: artifact
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_LABEL: ${{ matrix.label }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [[ "$MATRIX_OS" == "linux" ]]; then
            SRC=$(find "target/${MATRIX_TARGET}/debian" -name '*.deb' | head -1)
            DEST="scribe_v0.0.0-test_${MATRIX_LABEL}.deb"
          else
            SRC="target/Scribe.dmg"
            DEST="Scribe_v0.0.0-test_${MATRIX_LABEL}.dmg"
          fi
          cp "$SRC" "$DEST"
          KEYFILE="$(mktemp)"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$KEYFILE"
          minisign -Sm "$DEST" -s "$KEYFILE"
          rm -f "$KEYFILE"
          echo "artifact=$DEST" >> "$GITHUB_OUTPUT"
          echo "sigfile=${DEST}.minisig" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: test-${{ matrix.label }}
          path: |
            ${{ steps.artifact.outputs.artifact }}
            ${{ steps.artifact.outputs.sigfile }}
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Build ${{ matrix.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ matrix.target }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: \`${{ steps.artifact.outputs.artifact }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signature: \`${{ steps.artifact.outputs.sigfile }}\`" >> "$GITHUB_STEP_SUMMARY"
